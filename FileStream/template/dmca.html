<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 File Removed</title>
    <link rel="icon" href="https://i.ibb.co/Hh4kF2b/icon.png" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        setTimeout(() => {
            window.location.href = "{{ bot_url }}";
        }, 5000);
    </script>
</head>
<body class="bg-[#050505] flex h-screen items-center justify-center p-4 font-sans antialiased">
    <div class="max-w-xl w-full bg-[#111] border border-red-900/50 rounded-2xl shadow-2xl overflow-hidden p-8 text-center relative selection:bg-red-500/30">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-red-600 via-rose-500 to-red-400"></div>
        
        <div class="w-20 h-20 mx-auto bg-red-500/10 rounded-2xl flex items-center justify-center mb-6 border border-red-500/20 shadow-[0_0_30px_rgba(239,68,68,0.15)] rotate-3">
            <svg class="w-10 h-10 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        
        <h1 class="text-3xl font-extrabold text-white mb-4 tracking-tight">Content Unavailable</h1>
        
        <p class="text-gray-400 mb-8 leading-relaxed">
            The file you are explicitly attempting to access has been permanently obliterated from our servers due to a <strong>Copyright Notice (DMCA)</strong> violation or it was natively revoked.<br><br>
            <span class="text-[10px] font-bold tracking-[0.2em] uppercase text-gray-500 border border-gray-800 rounded-md px-2.5 py-1.5 bg-black/40">FilezToLinkX Infrastructure</span>
        </p>
        
        <div class="flex items-center justify-center gap-2 mb-8 bg-blue-900/10 border border-blue-500/10 py-3 rounded-lg w-fit mx-auto px-6">
            <div class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></div>
            <p class="text-blue-400 text-sm font-semibold tracking-wide">Routing to central authority in <span id="timer" class="text-blue-300 font-mono text-lg">5</span>s...</p>
        </div>

        <a href="{{ bot_url }}" class="inline-flex items-center justify-center w-full sm:w-auto px-8 py-3.5 text-sm font-bold text-white bg-blue-600 rounded-xl hover:bg-blue-500 transition-all shadow-[0_0_20px_rgba(37,99,235,0.4)] hover:shadow-[0_0_30px_rgba(37,99,235,0.6)] hover:-translate-y-0.5 duration-300 border border-blue-400/50">
            Go To Bot Instantly
            <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        </a>
    </div>

    <script>
        let timeLeft = 5;
        const timerElement = document.getElementById('timer');
        const countdown = setInterval(() => {
            timeLeft--;
            if(timeLeft > 0) {
                timerElement.textContent = timeLeft;
            } else {
                clearInterval(countdown);
            }
        }, 1000);
    </script>
</body>
</html>
